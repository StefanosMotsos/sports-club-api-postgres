# Database settings
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5432}/${PG_DB:sportsdb}
spring.datasource.username=${PG_USER:user9}
spring.datasource.password=${PG_PASSWORD:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

spring.jpa.properties.hibernate.default_schema=sportsclub

# disable first time to generate create tables
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=sportsclub

app.security.secret-key=C3sq1yIE0oUOTtaxXmekt+/ZO5FybEn74qdKq+mZ1MP/u7OEyC8dAmydIu0A/ae7
app.security.jwt-expiration=10800000

# make sure to use JOIN FETCH
spring.jpa.open-in-view=false

allowed.origins=http://localhost:5173,http://localhost:3000,https://sports-club.apps.gr
file.upload.dir=uploads/

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

spring.web.locale=el
spring.web.locale-resolver=fixed